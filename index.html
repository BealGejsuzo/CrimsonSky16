<!DOCTYPE html>
<html>
<head>
    <title>Hash Generator - SHA512</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        .box {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #0f0;
            padding: 20px;
        }
        button {
            background: #0f0;
            color: #000;
            padding: 10px;
            cursor: pointer;
        }
        input {
            width: 100%;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px 0;
        }
        .hash {
            background: #000;
            padding: 15px;
            word-break: break-all;
            border: 1px solid #0f0;
            font-size: 12px;
            font-family: monospace;
        }
        .info {
            color: #ff0;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 SHA512 HASH GENERATOR</h2>
        <p>Upload file <strong>ares.js / nexsus.js</strong></p>
        <div class="info">⚠ Hash length: 128 karakter (SHA512)</div>
        <input type="file" id="fileInput" accept=".js">
        <button onclick="getHash()">Generate SHA512 Hash</button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        async function getHash() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('Pilih file dulu!');
            
            const buffer = await file.arrayBuffer();
            const hash = await crypto.subtle.digest('SHA-512', buffer);
            const hashHex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
            
            document.getElementById('result').innerHTML = `
                <strong>SHA512 Hash (128 karakter):</strong>
                <div class="hash">${hashHex}</div>
                <button onclick="copy('${hashHex}')">Copy Hash</button>
                <br><br>
                <strong>Paste ke sec.js:</strong>
                <div class="hash">module.exports = { HASH_MAIN: "${hashHex}" };</div>
            `;
        }
        
        function copy(text) {
            navigator.clipboard.writeText(text);
            alert('Hash copied! (128 karakter)');
        }
    </script>
</body>
</html>
